<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habilitaciones La Plata · By Gestor La Plata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
:root{
  --navy:#1D3557; --verde-dark:#145E38; --verde:#1A7A4A; --verde-medio:#229459;
  --verde-acento:#2EAD6B; --mint:#E8F5EE; --fondo:#F1F3F5; --texto:#212529;
  --muted:#6c757d; --wa:#25D366; --white:#fff;
  --border:rgba(29,53,87,0.10); --border-strong:rgba(29,53,87,0.18);
  --shadow-sm:0 2px 8px rgba(26,122,74,.06);
  --shadow-md:0 6px 20px rgba(26,122,74,.08);
  --shadow-lg:0 12px 40px rgba(26,122,74,.10);
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:var(--fondo);color:var(--texto);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
body{display:flex;min-height:100vh}
h1,h2,h3,h4,h5,h6,.font-display{font-family:'Poppins',sans-serif;color:var(--navy);letter-spacing:-0.01em}
a{color:var(--verde);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}

.sidebar{width:260px;background:linear-gradient(180deg,var(--navy) 0%,#152741 100%);color:var(--white);padding:24px 18px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.brand{padding:8px 12px 22px 12px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:14px}
.brand h1{font-size:21px;font-weight:800;color:var(--white);line-height:1.1;margin-bottom:2px}
.brand .sub{font-size:11.5px;color:var(--verde-acento);font-weight:500;letter-spacing:.06em;text-transform:uppercase;font-family:'Poppins'}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);padding:14px 12px 4px;font-weight:600}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:rgba(255,255,255,.82);font-size:14px;font-weight:500;transition:all .15s}
.nav a:hover{background:rgba(255,255,255,.06);color:var(--white)}
.nav a.active{background:var(--verde);color:var(--white);box-shadow:0 4px 12px rgba(26,122,74,.4)}
.nav a .ico{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.sidebar-foot{margin-top:auto;padding:14px 12px;font-size:11px;color:rgba(255,255,255,.4);border-top:1px solid rgba(255,255,255,.08)}

.main{flex:1;min-width:0;padding:34px 44px 80px;max-width:1280px}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:20px}
.page-head h1{font-size:32px;font-weight:800;line-height:1.1}
.page-head .sub{color:var(--muted);font-size:14px;margin-top:6px}
.page-head .actions{display:flex;gap:10px;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:8px;font-size:13.5px;font-weight:600;font-family:'Poppins';text-transform:uppercase;letter-spacing:.04em;transition:all .15s;border:none;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--verde);color:var(--white);box-shadow:0 4px 14px rgba(26,122,74,.3)}
.btn-primary:hover{background:var(--verde-dark);transform:translateY(-1px);box-shadow:0 6px 18px rgba(26,122,74,.4)}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border-strong)}
.btn-ghost:hover{background:var(--mint);border-color:var(--verde);color:var(--verde)}
.btn-danger{background:transparent;color:#b03030;border:1.5px solid rgba(176,48,48,.3)}
.btn-danger:hover{background:#fff0f0;border-color:#b03030}
.btn-sm{padding:6px 12px;font-size:11.5px}
.btn-icon{padding:8px;border-radius:7px;background:transparent;color:var(--muted);transition:all .15s;font-size:15px}
.btn-icon:hover{background:var(--mint);color:var(--verde)}

.card{background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:all .15s}
.card.featured{border-top:4px solid var(--verde)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.metric{padding:18px 20px}
.metric .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-bottom:6px}
.metric .value{font-family:'Poppins';font-size:28px;font-weight:800;color:var(--navy);line-height:1}
.metric .delta{font-size:12px;color:var(--verde);margin-top:4px;font-weight:500}

.tbl-wrap{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--mint);text-align:left;padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--verde);font-weight:700;font-family:'Poppins';border-bottom:1px solid var(--border)}
.tbl td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover{background:rgba(232,245,238,.4)}
.tbl .cell-strong{font-weight:600;color:var(--navy)}
.tbl .cell-muted{color:var(--muted);font-size:13px}
.tbl .row-actions{display:flex;gap:4px;justify-content:flex-end}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-family:'Poppins'}
.badge-verde{background:rgba(26,122,74,.12);color:var(--verde)}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-gris{background:#e5e7eb;color:#374151}
.badge-info{background:rgba(29,53,87,.1);color:var(--navy)}
.badge-acento{background:rgba(244,162,97,.18);color:#b06022}

.estado{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-family:'Poppins'}
.e-pre_encuadre{background:#e0e7ff;color:#3730a3}
.e-en_carga{background:#fef3c7;color:#92400e}
.e-listo_presentar{background:rgba(26,122,74,.15);color:var(--verde)}
.e-presentado{background:rgba(46,173,107,.18);color:var(--verde-medio)}
.e-en_observacion{background:#fee2e2;color:#991b1b}
.e-aprobado{background:rgba(26,122,74,.2);color:var(--verde-dark);box-shadow:0 0 0 2px rgba(26,122,74,.08)}
.e-rechazado{background:#fecaca;color:#7f1d1d}
.e-cierre{background:#cbd5e1;color:#334155}
.e-archivado{background:#e5e7eb;color:#6b7280}

.form-group{margin-bottom:18px}
.form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--navy);margin-bottom:6px;font-family:'Poppins'}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border-strong);border-radius:8px;background:var(--white);color:var(--texto);transition:all .15s;font-size:14px}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--verde);box-shadow:0 0 0 3px rgba(26,122,74,.12)}
.form-textarea{resize:vertical;min-height:80px;font-family:inherit}
.form-help{font-size:12px;color:var(--muted);margin-top:5px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-check{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1.5px solid var(--border-strong);border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:8px}
.form-check:hover{background:var(--mint);border-color:var(--verde)}
.form-check input[type=checkbox],.form-check input[type=radio]{margin-top:2px;width:18px;height:18px;accent-color:var(--verde);flex-shrink:0}
.form-check .label-text{font-size:14px;font-weight:500;color:var(--texto)}
.form-check .label-help{font-size:12px;color:var(--muted);margin-top:2px}
.form-check.checked{background:var(--mint);border-color:var(--verde)}

.wizard{max-width:780px;margin:0 auto}
.stepper{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding:0 8px}
.step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.step.done:not(:last-child)::after{background:var(--verde)}
.step .num{position:relative;z-index:1;width:30px;height:30px;border-radius:50%;background:var(--fondo);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--muted);font-family:'Poppins'}
.step.active .num{background:var(--verde);border-color:var(--verde);color:var(--white);box-shadow:0 0 0 4px rgba(26,122,74,.18)}
.step.done .num{background:var(--verde);border-color:var(--verde);color:var(--white)}
.step .lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:center}
.step.active .lbl,.step.done .lbl{color:var(--navy)}
.wiz-step-card{background:var(--white);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-md);border:1px solid var(--border);border-top:4px solid var(--verde)}
.wiz-step-card h2{font-size:24px;margin-bottom:6px}
.wiz-step-card .step-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.wiz-nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}

.tabs{display:flex;gap:2px;border-bottom:1.5px solid var(--border);margin-bottom:24px;overflow-x:auto}
.tab{padding:12px 20px;font-size:13.5px;font-weight:600;color:var(--muted);font-family:'Poppins';text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid transparent;margin-bottom:-1.5px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--verde);border-bottom-color:var(--verde)}

.checklist-group{margin-bottom:28px}
.checklist-group h3{font-size:14px;text-transform:uppercase;letter-spacing:.06em;color:var(--verde);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);font-weight:700}
.check-item{padding:12px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--white);transition:all .15s}
.check-item.done{background:rgba(232,245,238,.5);border-color:rgba(26,122,74,.25)}
.check-item .head{display:flex;gap:12px;align-items:flex-start}
.check-item input[type=checkbox]{margin-top:3px;width:18px;height:18px;accent-color:var(--verde);flex-shrink:0}
.check-item .body{flex:1;min-width:0}
.check-item .label{font-size:14px;font-weight:500;color:var(--navy);line-height:1.4}
.check-item.done .label{color:var(--muted);text-decoration:line-through}
.check-item .help{font-size:12px;color:var(--muted);margin-top:3px}
.check-item .opcional{display:inline-block;font-size:9.5px;padding:1px 6px;background:#f0f0f0;color:var(--muted);border-radius:3px;margin-left:6px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;vertical-align:middle}
.check-item .expand-btn{background:transparent;color:var(--muted);font-size:12px;padding:2px 4px;cursor:pointer}
.check-item .extras{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);display:none;grid-template-columns:1fr 1fr 2fr;gap:10px}
.check-item.expanded .extras{display:grid}
.check-item .extras label{font-size:10px;text-transform:uppercase;font-weight:600;color:var(--muted);letter-spacing:.04em}
.check-item .extras input,.check-item .extras textarea{padding:6px 9px;font-size:13px;border:1px solid var(--border-strong);border-radius:6px;width:100%;font-family:inherit}

.progress{height:8px;background:var(--mint);border-radius:99px;overflow:hidden;margin:6px 0}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--verde) 0%,var(--verde-acento) 100%);transition:width .4s}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.progress-row .pct{font-weight:700;color:var(--verde);font-family:'Poppins'}

.rubro-card{padding:16px 20px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--verde)}
.rubro-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);background:var(--mint)}
.rubro-card .rubro-info{flex:1;min-width:0}
.rubro-card .rubro-nombre{font-weight:600;font-size:15px;color:var(--navy);margin-bottom:3px}
.rubro-card .rubro-meta{font-size:12px;color:var(--muted)}
.rubro-card .arrow{color:var(--verde);font-size:18px;flex-shrink:0;margin-left:12px;transition:transform .2s}
.rubro-card.open .arrow{transform:rotate(90deg)}
.rubro-detail{padding:20px;background:var(--mint);border-radius:0 0 var(--radius) var(--radius);margin-top:-12px;margin-bottom:14px;border:1px solid var(--border);border-top:none;display:none}
.rubro-detail.show{display:block}
.rubro-detail .grupo-block{margin-bottom:16px}
.rubro-detail .grupo-block h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--verde);margin-bottom:6px;font-weight:700}
.rubro-detail ul{list-style:none;padding-left:0}
.rubro-detail li{padding:5px 0;font-size:13.5px;color:var(--texto);position:relative;padding-left:18px}
.rubro-detail li::before{content:'✓';position:absolute;left:0;color:var(--verde);font-weight:700}
.rubro-detail li.opt::before{content:'○';color:var(--muted)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:var(--white);padding:14px 22px;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,.25);font-size:13.5px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;font-family:'Poppins'}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--verde)}
.toast.error{background:#b91c1c}

.portal-wrap{max-width:760px;margin:40px auto;padding:0 20px}
.portal-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--verde-dark) 100%);color:var(--white);padding:42px 36px;border-radius:var(--radius);margin-bottom:24px;box-shadow:var(--shadow-lg)}
.portal-hero h1{color:var(--white);font-size:30px;margin-bottom:8px}
.portal-hero .sub{color:var(--verde-acento);font-weight:500;font-size:14px;letter-spacing:.04em;text-transform:uppercase;font-family:'Poppins';margin-bottom:14px}
.portal-hero .desc{color:rgba(255,255,255,.85);font-size:15px;max-width:540px}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .icon{font-size:48px;opacity:.4;margin-bottom:16px}
.empty h3{color:var(--navy);font-size:18px;margin-bottom:8px}
.empty p{font-size:14px;margin-bottom:20px}

.modal-bg{position:fixed;inset:0;background:rgba(29,53,87,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:var(--radius);max-width:480px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.3);border-top:4px solid var(--verde)}
.modal h3{font-size:20px;margin-bottom:8px}
.modal p{color:var(--muted);font-size:14px;margin-bottom:18px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}

.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--mint);color:var(--verde);border-radius:99px;font-size:11.5px;font-weight:600;font-family:'Poppins'}

@media (max-width:880px){
  body{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;gap:6px;overflow-x:auto;padding:14px}
  .brand,.nav-section,.sidebar-foot{display:none}
  .nav{display:flex;flex-direction:row;gap:4px}
  .nav a{padding:8px 12px;font-size:12px;white-space:nowrap}
  .main{padding:20px 18px 60px}
  .page-head{flex-direction:column;align-items:flex-start;gap:12px}
  .page-head h1{font-size:24px}
  .form-row{grid-template-columns:1fr}
}

.row{display:flex;gap:14px;align-items:center}
.row.wrap{flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:14px}
.gap-sm{gap:6px}
.gap-md{gap:14px}
.mt-md{margin-top:14px}
.mt-lg{margin-top:24px}
.mb-md{margin-bottom:14px}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.text-right{text-align:right}
.hidden{display:none!important}
.font-mono{font-family:'JetBrains Mono','Courier New',monospace;font-size:12.5px}
.code-pill{display:inline-block;padding:2px 7px;background:var(--mint);color:var(--verde);border-radius:5px;font-size:12px;font-weight:600;font-family:'JetBrains Mono','Courier New',monospace}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <h1>Habilitaciones La&nbsp;Plata</h1>
    <div class="sub">By Gestor La Plata</div>
  </div>
  <div class="nav-section">Trabajo diario</div>
  <nav class="nav" id="nav">
    <a href="#/" data-route=""><span class="ico">📊</span>Dashboard</a>
    <a href="#/expedientes" data-route="expedientes"><span class="ico">📁</span>Expedientes</a>
    <a href="#/historicos" data-route="historicos"><span class="ico">🗄️</span>Archivos Históricos</a>
    <a href="#/clientes" data-route="clientes"><span class="ico">👥</span>Clientes</a>
    <a href="#/vencimientos" data-route="vencimientos"><span class="ico">⏰</span>Vencimientos</a>

  <nav class="nav">

</aside>

<main class="main" id="main"></main>

  <div class="modal" id="modalBody" onclick="event.stopPropagation()"></div>
</div>
<div id="toast" class="toast"></div>

<script>
const ESTADOS = {
  PRE_ENCUADRE:    {label:'Pre-encuadre',         clase:'e-pre_encuadre'},
  EN_CARGA:        {label:'En carga',             clase:'e-en_carga'},
  LISTO_PRESENTAR: {label:'Listo para presentar', clase:'e-listo_presentar'},
  PRESENTADO:      {label:'Presentado',           clase:'e-presentado'},
  EN_OBSERVACION:  {label:'En observación',       clase:'e-en_observacion'},
  APROBADO:        {label:'Aprobado',             clase:'e-aprobado'},
  RECHAZADO:       {label:'Rechazado',            clase:'e-rechazado'},
  CIERRE:          {label:'Cerrado',              clase:'e-cierre'},
  ARCHIVADO:       {label:'Archivado',            clase:'e-archivado'},
};

const TIPOS_TRAMITE = {
  HABILITACION_NUEVA: 'Habilitación nueva',
  MODIFICACION:       'Modificación de habilitación',
  TRANSFERENCIA:      'Transferencia de habilitación',
  CIERRE:             'Cierre / baja',
  REBA_INSCRIPCION:   'ReBA — Inscripción',
  REBA_RENOVACION:    'ReBA — Renovación',
};

const GRUPOS = {
  generales:       '1 · Requisitos generales (todos los comercios)',
  personeria:      '1 · Personería jurídica',
  inmueble:        '1 · Inmueble · planos · derecho de uso',
  antisiniestral:  '1 · Informe de seguridad antisiniestral',
  modificacion:    '1 · Modificación / Transferencia',
  servicios:       '1 · Servicios (gas / agua caliente)',
  especiales:      '2 · Actividad especial · documentación complementaria',
  ord_10799_grl:   '3 · Ord. 10.799 — Generales (permanencia público)',
  ord_10799_cat:   '3 · Ord. 10.799 — Categoría específica',
  ord_10799_rad:   '3 · Ord. 10.799 — Radiales 200m',
  bomberos:        '4 · Bomberos (obligatorio si aplica Ord. 10.799)',
  reba:            'ReBA · Inscripción / Renovación',

/* Devuelve los items de actividades especiales según el rubro */
function reqActEspeciales(rubroId, ctx){
  const rub = RUBROS.find(r=>r.id===rubroId);
  if(!rub || !rub.actividades || !rub.actividades.length) return [];
  const out = [];
  for(const actKey of rub.actividades){
    const act = ACT_ESPECIALES[actKey];
    if(!act) continue;
    for(const it of (act.items||[])){
      // soporta solo_si_act simple (es_gnc, es_liquidos, etc.)
      if(it.solo_si_act && !ctx[it.solo_si_act]) continue;
      out.push({
        ...it,
        grupo:'especiales',
        label: `[${act.label}${act.ord?' · Ord. '+act.ord:''}] ${it.label}`,
      });
    }
  }
  return out;
}

function buildContext(exp){
  const cli = STORE.clientes.find(c=>c.id===exp.cliente_id) || {};
  const rub = findRubro(exp.rubro_id) || {actividades:[]};
  const sup = Number(exp.superficie_m2)||0;
  return {

    tiene_mesas_via_publica: !!exp.tiene_mesas_via_publica,
    es_modificacion: exp.tipo_tramite==='MODIFICACION',
    es_transferencia: exp.tipo_tramite==='TRANSFERENCIA',
    es_reba: exp.tipo_tramite==='REBA_INSCRIPCION' || exp.tipo_tramite==='REBA_RENOVACION',
    es_reba_inscripcion: exp.tipo_tramite==='REBA_INSCRIPCION',
    es_reba_renovacion: exp.tipo_tramite==='REBA_RENOVACION',
    permanencia_publico: !!exp.categoria_10799,
    categoria_10799: exp.categoria_10799 || null,
    persona_juridica: cli.persona_tipo==='JURIDICA',
    planos_desactualizados: !!exp.planos_desactualizados,
    manifestaciones_artisticas: !!exp.manifestaciones_artisticas,
    superficie_grande: sup > 300 || !!exp.manifestaciones_artisticas,
    es_gnc: !!exp.es_gnc,
    es_liquidos: !!exp.es_liquidos,
  };
}

function aplica(reglaStr, ctx){
  if(!reglaStr) return true;
  const r = reglaStr.toLowerCase().trim();
  if(r.includes(' or ')){ return r.split(/\s+or\s+/).some(p=>aplica(p, ctx)); }
  if(r.includes(' and ')){ return r.split(/\s+and\s+/).every(p=>aplica(p, ctx)); }
  const neg = r.match(/^not\s+([a-z_0-9]+)$/);
  if(neg) return !ctx[neg[1]];
  const m = r.match(/^([a-z_0-9]+)\s+in\s+\(([^)]+)\)$/);
  if(m){
    const k = m[1];
    const vals = m[2].split(',').map(v=>v.trim().toUpperCase());
    return vals.includes(String(ctx[k]||'').toUpperCase());
  }
  if(/^[a-z_0-9]+$/.test(r)) return !!ctx[r];
  return true;
}

function generarItems(exp){
  const ctx = buildContext(exp);
  // requisitos base + actividades especiales
  const baseFiltrados = TODOS_REQ.filter(req => aplica(req.solo_si, ctx));
  const actEsp = reqActEspeciales(exp.rubro_id, ctx);
  return [...baseFiltrados, ...actEsp]
    .map(req => {
      const ya = (exp.items||[]).find(i=>i.codigo===req.codigo);
      return {
        codigo: req.codigo,
        grupo: req.grupo,
        label: req.label,
        help: req.help || '',
        obligatorio: !!req.obligatorio,
        vence: !!req.vence,
        checked: ya?.checked || false,
        foja: ya?.foja || '',
        vencimiento: ya?.vencimiento || '',
        observacion: ya?.observacion || '',
      };
    });
}

function progresoPct(exp){
  const items = exp.items || [];
  const obl = items.filter(i=>i.obligatorio);
  if(!obl.length) return 0;
  const done = obl.filter(i=>i.checked).length;
  return Math.round((done / obl.length) * 100);
}

function fmtDate(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.slice(0,10).split('-');
  return `${d}/${m}/${y}`;
}
function diasHasta(iso){
  if(!iso) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const v = new Date(iso); v.setHours(0,0,0,0);
  return Math.floor((v-hoy)/(1000*60*60*24));
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

function vencProximos(){
  const out = [];
  for(const exp of STORE.expedientes){
    if(exp.estado==='ARCHIVADO') continue;

      const d = diasHasta(it.vencimiento);
      if(d!==null && d <= 30) out.push({exp, item:it, dias:d});
    }
  }
  return out.sort((a,b)=>a.dias-b.dias);
}

function confArchivar(id){
  const e = STORE.expedientes.find(x=>x.id===id);
  if(!e) return;
  modal(`
    <h3>Archivar expediente</h3>
    <p>El expediente <b>${escapeHtml(e.denominacion||'sin nombre')}</b> se moverá a Archivos Históricos. Lo vas a poder consultar cuando quieras y desarchivar si lo necesitás.</p>

      <button class="btn btn-ghost" onclick="cerrarModal({target:{id:'modal'}})">Cancelar</button>
      <button class="btn btn-primary" onclick="archivar('${id}')">📦 Archivar</button>
    </div>
  `);

window.confArchivar = confArchivar;

function archivar(id){
  const e = STORE.expedientes.find(x=>x.id===id);
  if(!e) return;
  e.estado_previo_archivo = e.estado;
  e.estado = 'ARCHIVADO';
  e.fecha_archivado = new Date().toISOString().slice(0,10);
  guardarStore(STORE);
  cerrarModal({target:{id:'modal'}});
  toast('Expediente archivado', 'ok');
  render();
}
window.archivar = archivar;

function desarchivar(id){
  const e = STORE.expedientes.find(x=>x.id===id);
  if(!e) return;
  e.estado = e.estado_previo_archivo || 'EN_CARGA';
  delete e.estado_previo_archivo;
  delete e.fecha_archivado;
  guardarStore(STORE);
  toast('Expediente reactivado', 'ok');
  render();
}
window.desarchivar = desarchivar;

function confBorrar(id){
  const e = STORE.expedientes.find(x=>x.id===id);
  if(!e) return;
  modal(`
    <h3 style="color:#b91c1c">Borrar expediente</h3>
    <p>Esta acción es <b>irreversible</b>. Se va a borrar el expediente <b>${escapeHtml(e.denominacion||'sin nombre')}</b>, sus items, fojas y observaciones.</p>

}

function borrar(id){
  STORE.expedientes = STORE.expedientes.filter(x=>x.id!==id);

function aplicarCambioRubro(id){
  const e = STORE.expedientes.find(x=>x.id===id);
  if(!e) return;
  const nuevo = document.getElementById('cr_nuevo_rubro').value;
  const motivo = document.getElementById('cr_motivo').value.trim();
  if(!nuevo){ toast('Elegí un rubro','error'); return; }
  if(nuevo === e.rubro_id){ toast('Es el mismo rubro','error'); return; }
  if(!motivo){ toast('Cargá un motivo del cambio','error'); return; }

  // Trazabilidad
  if(!e.historial_rubros) e.historial_rubros = [];
  e.historial_rubros.push({
    rubro_id: nuevo,
    rubro_anterior: e.rubro_id,
    fecha: new Date().toISOString().slice(0,10),
    motivo: motivo,
    usuario: 'Gestor',
  });
  e.rubro_id = nuevo;
  // Regenerar items preservando estado
  e.items = generarItems(e);
  guardarStore(STORE);
  cerrarModal({target:{id:'modal'}});
  toast('Rubro actualizado · checklist regenerado','ok');
  render();
}
window.aplicarCambioRubro = aplicarCambioRubro;

function getTitular(exp){
  const cli = STORE.clientes.find(c=>c.id===exp.cliente_id) || {};
  const t = exp.titular;
  if(!t || t.es_mismo_cliente){

let wiz = null;

function renderWizard(){
  if(!wiz) wiz = {
    step:1, cliente_id:'', cliente_nuevo:null, nuevo_modo:false,
    tipo_tramite:'HABILITACION_NUEVA', rubro_id:'',
    denominacion:'', direccion_comercial:'', partida_inmobiliaria:'',
    superficie_m2:'', factor_ocupacion:'', numero_municipal:'',
    categoria_10799:'', tiene_gas:false, tiene_agua_caliente:false,
    tiene_mesas_via_publica:false, planos_desactualizados:false, notas:'',
  };

  const isReba = wiz.tipo_tramite==='REBA_INSCRIPCION' || wiz.tipo_tramite==='REBA_RENOVACION';
  const steps = isReba
    ? ['Titular','Trámite','Datos','Revisar']
    : ['Titular','Trámite','Comercio','Condiciones','Revisar'];
  const totalSteps = steps.length;

  let body = '';
  if(wiz.step===1) body = wizPaso1();
  else if(wiz.step===2) body = wizPaso2();
  else if(wiz.step===3 && isReba) body = wizPasoRebaDatos();
  else if(wiz.step===3) body = wizPaso3Comercio();
  else if(wiz.step===4 && isReba) body = wizPasoRevisar();
  else if(wiz.step===4) body = wizPaso4Condiciones();
  else if(wiz.step===5) body = wizPasoRevisar();

  return `
  <div class="page-head">
    <div><h1>Nuevo expediente</h1><div class="sub">Wizard guiado · paso ${wiz.step} de ${totalSteps}</div></div>
    <div class="actions"><button class="btn btn-ghost" onclick="cancelarWizard()">Cancelar</button></div>
  </div>

  <div class="wizard">
    <div class="stepper">
      ${steps.map((label,i)=>{
        const n = i+1;
        let cls = '';
        if(n < wiz.step) cls = 'done';
        if(n === wiz.step) cls = 'active';
        return `<div class="step ${cls}"><div class="num">${n}</div><div class="lbl">${label}</div></div>`;
      }).join('')}
    </div>

    <div class="wiz-step-card">${body}</div>
  </div>
  `;
}

function wizPaso1(){
  return `
    <h2>¿Quién es el titular?</h2>
    <div class="step-sub">Elegí un cliente existente o cargá uno nuevo.</div>

    <div class="form-group">

function wizSet(k,v){ wiz[k] = (v==='true'?true: v==='false'?false: v); }
function wizSetRender(k,v){ wiz[k]=v; render(); }
function wizSetCliente(v){
  if(v==='__nuevo__'){
    wiz.nuevo_modo = true;
    wiz.cliente_id = '';
    if(!wiz.cliente_nuevo) wiz.cliente_nuevo = {persona_tipo:'FISICA', razon_social:'', cuit:''};
  }else{
    wiz.nuevo_modo = false;
    wiz.cliente_id = v;
    wiz.cliente_nuevo = null;
  }
  render();
}
function wizCNuevo(k,v){ if(!wiz.cliente_nuevo) wiz.cliente_nuevo={}; wiz.cliente_nuevo[k]=v; }
window.wizSet = wizSet; window.wizSetRender = wizSetRender;
window.wizSetCliente = wizSetCliente; window.wizCNuevo = wizCNuevo;

function wizStep(delta){
  const target = wiz.step + delta;
  if(delta>0){
    if(wiz.step===1){
      if(!wiz.cliente_id && !wiz.nuevo_modo){ toast('Elegí un cliente o cargá uno nuevo','error'); return; }
      if(wiz.nuevo_modo){
        const c = wiz.cliente_nuevo||{};
        if(!c.razon_social || !c.cuit){ toast('Razón social y CUIT obligatorios','error'); return; }
      }
    }
    if(wiz.step===3 && wiz.tipo_tramite!=='REBA_INSCRIPCION' && wiz.tipo_tramite!=='REBA_RENOVACION'){
      if(!wiz.denominacion || !wiz.direccion_comercial || !wiz.rubro_id){
        toast('Denominación, dirección y rubro son obligatorios','error'); return;
      }
    }
  }
  wiz.step = Math.max(1, target);
  render();
}
window.wizStep = wizStep;

function crearExpediente(){
  let clienteId = wiz.cliente_id;
  if(wiz.nuevo_modo && wiz.cliente_nuevo){
    const nuevo = {id:uid(), ...wiz.cliente_nuevo};
    STORE.clientes.push(nuevo);
    clienteId = nuevo.id;
  }
  const exp = {
    id: uid(),
    cliente_id: clienteId,
    rubro_id: wiz.rubro_id,
    tipo_tramite: wiz.tipo_tramite,
    denominacion: wiz.denominacion,
    direccion_comercial: wiz.direccion_comercial,
    partida_inmobiliaria: wiz.partida_inmobiliaria,
    superficie_m2: wiz.superficie_m2 ? Number(wiz.superficie_m2) : null,
    factor_ocupacion: wiz.factor_ocupacion ? Number(wiz.factor_ocupacion) : null,
    numero_municipal: wiz.numero_municipal,
    categoria_10799: wiz.categoria_10799 || null,
    tiene_gas: !!wiz.tiene_gas,
    tiene_agua_caliente: !!wiz.tiene_agua_caliente,
    tiene_mesas_via_publica: !!wiz.tiene_mesas_via_publica,
    planos_desactualizados: !!wiz.planos_desactualizados,
    estado: 'PRE_ENCUADRE',
    fecha_inicio: new Date().toISOString().slice(0,10),
    notas: wiz.notas,
    items: [],
    portal_token: null,
    /* Actividad comercial */
    memoria_descriptiva: '',
    actividades_naiib: [],
    /* Trazabilidad de cambios de rubro */
    historial_rubros: [{
      rubro_id: wiz.rubro_id,
      fecha: new Date().toISOString().slice(0,10),
      motivo: 'Alta del expediente',
      usuario: 'Gestor',
    }],
  };
  exp.items = generarItems(exp);
  STORE.expedientes.unshift(exp);

  </div>

  <div class="tabs">
    <div class="tab ${tab==='resumen'?'active':''}" onclick="navTo('expedientes/${e.id}/resumen')">Resumen</div>

async function generarConvenioPdf(expId){
  const e = STORE.expedientes.find(x=>x.id===expId); if(!e) return;
  // capturar config del modal
  const tipo = document.querySelector('input[name=cv_tipo]:checked')?.value || 'generales';
  const honorarios = document.getElementById('cv_honorarios').value.trim();
  const fecha = document.getElementById('cv_fecha').value;
  const sitio = document.getElementById('cv_sitio').value;
  const extras = document.getElementById('cv_extras').value.trim();
  const responsable = document.getElementById('cv_responsable')?.value || 'gestor';
  e.convenio = {tipo, honorarios, sitio_web:sitio, items_extras:extras, responsable_complementarios:responsable, fecha_contratacion:fecha};
  guardarStore(STORE);

  toast('Generando convenio...');
  if(!window.PDFLib){ toast('Error: pdf-lib no cargó','error'); return; }
  const {PDFDocument, StandardFonts, rgb} = window.PDFLib;
  const cli = STORE.clientes.find(c=>c.id===e.cliente_id) || {};
  const rub = findRubro(e.rubro_id) || {};
  const pdf = await PDFDocument.create();
  const helv = await pdf.embedFont(StandardFonts.Helvetica);
  const helvBold = await pdf.embedFont(StandardFonts.HelveticaBold);
  const helvItal = await pdf.embedFont(StandardFonts.HelveticaOblique);

  const navy = rgb(29/255,53/255,87/255);
  const verde = rgb(26/255,122/255,74/255);
  const verdeAcento = rgb(46/255,173/255,107/255);
  const muted = rgb(0.45,0.45,0.45);
  const ink = rgb(0.13,0.15,0.16);
  const rule = rgb(0.85,0.88,0.85);

  let page = pdf.addPage([595.28, 841.89]);
  const W = page.getWidth(), H = page.getHeight(), M = 56;
  let y = H - 50;

  function newPage(){
    page = pdf.addPage([595.28, 841.89]);
    // header chico en páginas internas
    page.drawText('Habilitaciones La Plata · Convenio de gestión', {x:M, y:H-30, size:8, font:helvItal, color:muted});
    page.drawLine({start:{x:M,y:H-36}, end:{x:W-M,y:H-36}, thickness:.3, color:rule});
    return H - 60;
  }
  function checkRoom(min){ if(y < (min + 90)) y = newPage(); }
  function wrap(text, font, size, maxWidth){
    const words = String(text||'').split(/\s+/);
    const lines = []; let line = '';
    for(const w of words){
      const test = line ? line+' '+w : w;
      if(font.widthOfTextAtSize(test, size) > maxWidth && line){
        lines.push(line); line = w;
      } else line = test;
    }
    if(line) lines.push(line);
    return lines;
  }
  function drawPara(text, opts={}){
    const {size=10, font=helv, color=ink, leading=13, indent=0, maxWidth=W-2*M-indent} = opts;
    const lines = wrap(text, font, size, maxWidth);
    for(const l of lines){
      checkRoom(leading);
      page.drawText(l, {x:M+indent, y, size, font, color});
      y -= leading;
    }
  }
  function drawHeading(text, size=12){
    checkRoom(size+8);
    page.drawText(text, {x:M, y, size, font:helvBold, color:navy});
    y -= size+4;
    page.drawLine({start:{x:M,y}, end:{x:M+40,y}, thickness:1.5, color:verde});
    y -= 10;
  }
  function drawBullet(text, opts={}){
    const {size=10, leading=13} = opts;
    const lines = wrap(text, helv, size, W-2*M-14);
    for(let i=0;i<lines.length;i++){
      checkRoom(leading);
      if(i===0) page.drawText('•', {x:M, y, size, font:helvBold, color:verde});
      page.drawText(lines[i], {x:M+14, y, size, font:helv, color:ink});
      y -= leading;
    }
  }
  function drawKV(k, v){
    checkRoom(15);
    page.drawText(k, {x:M, y, size:9, font:helvBold, color:muted});
    const kw = helvBold.widthOfTextAtSize(k, 9);
    const lines = wrap(v||'_______________________________', helv, 10, W-2*M-kw-10);
    page.drawText(lines[0]||'', {x:M+kw+8, y, size:10, font:helv, color:ink});
    y -= 14;
    for(let i=1;i<lines.length;i++){
      checkRoom(13);
      page.drawText(lines[i], {x:M, y, size:10, font:helv, color:ink});
      y -= 13;
    }
  }
  function space(n=8){ y -= n; }

  /* ─── HEADER ─────────────────────────────────────────── */
  page.drawRectangle({x:0, y:H-44, width:W, height:44, color:navy});
  page.drawText('HABILITACIONES LA PLATA', {x:M, y:H-26, size:14, font:helvBold, color:rgb(1,1,1)});
  page.drawText('By Gestor La Plata', {x:M, y:H-39, size:8.5, font:helvItal, color:verdeAcento});

  const subtPorTipo = {
    generales:'Actividades que cumplen con requisitos generales',
    complementarios:'Actividades que cumplen con requisitos complementarios',
    ord10799:'Ordenanza 10.799 — Permanencia de público',
  };
  page.drawText(subtPorTipo[tipo], {x:M, y:H-58, size:9, font:helvBold, color:muted});

  y = H - 90;
  page.drawText('CONVENIO DE GESTIÓN', {x:M, y, size:22, font:helvBold, color:navy});
  y -= 28;

  /* ─── DATOS DE LAS PARTES ─────────────────────────── */
  drawHeading('Datos de las partes', 11);
  page.drawText('EL GESTOR', {x:M, y, size:9, font:helvBold, color:verde});
  y -= 13;

async function generarPdf(expId, tipo){
  const e = STORE.expedientes.find(x=>x.id===expId); if(!e) return;
  toast('Generando PDF...');
  if(!window.PDFLib){ toast('Error: pdf-lib no cargó','error'); return; }
  const {PDFDocument, StandardFonts, rgb} = window.PDFLib;
  const cli = STORE.clientes.find(c=>c.id===e.cliente_id) || {};
  const rub = findRubro(e.rubro_id) || {};
  const pdf = await PDFDocument.create();
  const helv = await pdf.embedFont(StandardFonts.Helvetica);
  const helvBold = await pdf.embedFont(StandardFonts.HelveticaBold);
  const helvItal = await pdf.embedFont(StandardFonts.HelveticaOblique);

  const navy = rgb(29/255,53/255,87/255);
  const verde = rgb(26/255,122/255,74/255);
  const verdeAcento = rgb(46/255,173/255,107/255);
  const muted = rgb(0.45,0.45,0.45);
  const ink = rgb(0.13,0.15,0.16);
  const rule = rgb(0.85,0.88,0.85);

  const TITULOS = {
    completo:'Documentación Completa', ddjj:'DDJJ del Comercio',
    anexo1:'Anexo 1 — Datos Generales', anexo2:'Anexo 2 — Antisiniestral',
    anexo3:'Anexo 3 — Ordenanza 10799', bomberos:'Carpeta Bomberos',
    reba:'Carpeta ReBA', reg137:'Plan de Regularización · Res. 137/2025',
    cierre:'Comprobante de Cierre',
  };
  const titulo = TITULOS[tipo] || 'Documento';

  let page = pdf.addPage([595.28, 841.89]);
  const W = page.getWidth(), H = page.getHeight(), M = 54;
  let y = H - M;

  function newPage(){
    page = pdf.addPage([595.28, 841.89]);
    page.drawText(`${titulo} — ${e.denominacion||''}`, {x:M, y:H-M+10, size:8, font:helv, color:muted});
    return H - M - 10;
  }
  function checkRoom(min){ if(y < (min + 60)) y = newPage(); }
  function drawSection(title){
    checkRoom(40);
    page.drawText(title.toUpperCase(), {x:M, y, size:10, font:helvBold, color:verde});
    y -= 6;
    page.drawLine({start:{x:M,y}, end:{x:W-M,y}, thickness:.5, color:verde});
    y -= 16;
  }
  function drawKV(k,v){
    checkRoom(20);
    page.drawText(String(k).toUpperCase(), {x:M, y, size:8, font:helvBold, color:muted});
    page.drawText(String(v||'—'), {x:M+150, y, size:10, font:helv, color:ink});
    y -= 16;
  }
  function drawCheck(it){
    checkRoom(20);
    const mark = it.checked ? '[x]' : '[ ]';
    const star = it.obligatorio ? '' : '  (opcional)';
    let line = `${mark} ${it.label}${star}`;
    if(it.foja) line += `  · Foja ${it.foja}`;
    if(it.vencimiento) line += `  · Vence ${fmtDate(it.vencimiento)}`;
    const max = 95;
    while(line.length > max){
      const cut = line.lastIndexOf(' ', max);
      const idx = cut > 0 ? cut : max;
      page.drawText(line.slice(0, idx), {x:M, y, size:9, font:helv, color:ink});
      line = '    '+line.slice(idx).trim();
      y -= 12; checkRoom(15);
    }
    page.drawText(line, {x:M, y, size:9, font:helv, color:ink});
    y -= 12;
    if(it.observacion){
      page.drawText('     '+it.observacion, {x:M, y, size:8, font:helvItal, color:muted});
      y -= 11;
    }
  }

  page.drawRectangle({x:0, y:H-40, width:W, height:40, color:navy});
  page.drawText('HABILITACIONES LA PLATA', {x:M, y:H-25, size:11, font:helvBold, color:rgb(1,1,1)});
  page.drawText('By Gestor La Plata', {x:M+170, y:H-25, size:9, font:helvItal, color:verdeAcento});
  page.drawText(`Generado ${new Date().toLocaleDateString('es-AR')}`, {x:W-M-130, y:H-25, size:8, font:helv, color:rgb(1,1,1)});

  y = H - 70;
  page.drawText(titulo, {x:M, y, size:22, font:helvBold, color:navy});
  y -= 22;
  page.drawText(`Expediente: ${e.denominacion||'(sin denominación)'} · ${e.numero_municipal?'N° '+e.numero_municipal:'sin número'}`, {x:M, y, size:10, font:helv, color:muted});
  y -= 30;

  drawSection('Datos del expediente');
  const tit = getTitular(e);
  drawKV('Titular', `${tit.razon_social||'—'} (${tit.persona_tipo||'—'})`);
  drawKV('CUIT', tit.cuit||'—');
  if(tit.dni_titular) drawKV('DNI titular', tit.dni_titular);
  drawKV('Domicilio fiscal', tit.direccion||'—');
  drawKV('Contacto', [tit.email, tit.telefono].filter(Boolean).join(' · ')||'—');
  if(!tit.es_mismo_cliente) drawKV('Representante / firma', `${cli.razon_social||'—'} · ${cli.cuit||'—'}`);
  drawKV('Denominación', e.denominacion||'—');
  drawKV('Dirección comercial', e.direccion_comercial||'—');
  drawKV('Partida inmobiliaria', e.partida_inmobiliaria||'—');
  if(e.superficie_m2) drawKV('Superficie', e.superficie_m2+' m²');
  if(e.factor_ocupacion) drawKV('Factor ocupación', e.factor_ocupacion+' personas');
  drawKV('Rubro', rub.nombre||'—');
  if(e.categoria_10799) drawKV('Categoría Ord. 10799', 'Cat. '+e.categoria_10799);
  drawKV('Tipo de trámite', TIPOS_TRAMITE[e.tipo_tramite]||'—');

  drawKV('Fecha de inicio', fmtDate(e.fecha_inicio));
  y -= 8;

  drawSection('Condiciones declaradas');
  drawKV('Instalación de gas', e.tiene_gas?'SÍ':'no');
  drawKV('Agua caliente sanitaria', e.tiene_agua_caliente?'SÍ':'no');
  drawKV('Mesas / sillas vía pública', e.tiene_mesas_via_publica?'SÍ':'no');
  drawKV('Planos desactualizados', e.planos_desactualizados?'SÍ — Aplica Res. 137/2025':'no');
  y -= 8;

  const grupoTipo = {
    completo:null, ddjj:null, anexo1:['generales','inmueble','personeria'],
    anexo2:['antisiniestral'], anexo3:['ord_10799'], bomberos:['bomberos'],
    reba:['reba'], reg137:['regularizacion'],
    cierre:['generales','inmueble'],
  };
  const filtroGrupos = grupoTipo[tipo];
  let itemsToShow = (e.items||[]);
  if(filtroGrupos) itemsToShow = itemsToShow.filter(i=>filtroGrupos.includes(i.grupo));

  if(itemsToShow.length){
    drawSection(tipo==='completo' ? 'Checklist completo del expediente' : 'Requisitos cargados');
    const grupos = [...new Set(itemsToShow.map(i=>i.grupo))];
    for(const g of grupos){
      checkRoom(40);
      page.drawText((GRUPOS[g]||g).toUpperCase(), {x:M, y, size:9, font:helvBold, color:navy});
      y -= 14;
      const its = itemsToShow.filter(i=>i.grupo===g);
      for(const it of its) drawCheck(it);
      y -= 6;
    }
  }

  if(['completo','ddjj','anexo1','cierre'].includes(tipo)){
    if(y < 130) y = newPage();
    y = Math.max(y, 120);
    y -= 20;
    page.drawLine({start:{x:M,y}, end:{x:W-M,y}, thickness:.5, color:rule});
    y -= 14;
    page.drawText('Firma del titular', {x:M, y, size:8, font:helv, color:muted});
    page.drawText('Aclaración', {x:W/2+20, y, size:8, font:helv, color:muted});
    y -= 50;
    page.drawLine({start:{x:M,y}, end:{x:M+180,y}, thickness:.5, color:ink});
    page.drawLine({start:{x:W/2+20,y}, end:{x:W-M,y}, thickness:.5, color:ink});
  }

  page.drawText(`Habilitaciones La Plata · By Gestor La Plata · ${new Date().toLocaleString('es-AR')}`,
    {x:M, y:30, size:7, font:helvItal, color:muted});

  const bytes = await pdf.save();
  const blob = new Blob([bytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${tipo}-${(e.denominacion||'expediente').replace(/[^a-zA-Z0-9]+/g,'-')}.pdf`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('PDF generado','ok');
}

function setClienteRol(id, rol){
  // capturar valores actuales antes de re-render
  const tmp = {};
  ['persona_tipo','razon_social','cuit','dni_titular','telefono','email','direccion','vinculo','notas'].forEach(k=>{
    const el = document.getElementById('cli_'+k);
    if(el) tmp[k] = el.value;
  });
  if(id==='nuevo' || !id || id===''){
    if(!window._cliNuevo) window._cliNuevo = {};
    Object.assign(window._cliNuevo, tmp, {tipo_contacto:rol});
  } else {
    const c = STORE.clientes.find(x=>x.id===id);
    if(c){ Object.assign(c, tmp, {tipo_contacto:rol}); guardarStore(STORE); }
  }
  render();
}
window.setClienteRol = setClienteRol;

function guardarCliente(id){
  const fields = ['persona_tipo','razon_social','cuit','dni_titular','telefono','email','direccion','vinculo','notas'];
  const data = fields.reduce((acc,k)=>{ const el=document.getElementById('cli_'+k); if(el) acc[k]=el.value.trim(); return acc; },{});
  // determinar rol
  const rolEl = document.querySelector('input[name=cli_rol]:checked');
  data.tipo_contacto = rolEl ? rolEl.value : (id ? (STORE.clientes.find(c=>c.id===id)?.tipo_contacto) : 'representante') || 'representante';
  // validaciones por rol
  if(!data.razon_social){ toast('El nombre es obligatorio','error'); return; }
  if(data.tipo_contacto==='titular' && !data.cuit){ toast('Para titular el CUIT es obligatorio','error'); return; }
  if(id){
    Object.assign(STORE.clientes.find(c=>c.id===id), data);
    toast('Contacto actualizado','ok');
  }else{
    STORE.clientes.push({id:uid(), ...data});
    toast(data.tipo_contacto==='titular'?'Titular creado':'Representante creado','ok');
  }
  window._cliNuevo = null;
  guardarStore(STORE);
  navTo('clientes');
}
window.guardarCliente = guardarCliente;

function borrarCliente(id){
  const tieneExp = STORE.expedientes.some(e=>e.cliente_id===id);
  if(tieneExp){ toast('No se puede borrar: tiene expedientes asociados','error'); return; }
  if(!confirm('¿Borrar este cliente?')) return;
  STORE.clientes = STORE.clientes.filter(c=>c.id!==id);
  guardarStore(STORE);
  toast('Cliente borrado','error');
  navTo('clientes');
}
window.borrarCliente = borrarCliente;

    <p class="small mb-md">Esta app guarda los datos en el navegador (localStorage), así que cada dispositivo tiene su propia copia. Para sincronizar:</p>
    <ol class="small" style="padding-left:24px;line-height:1.8">
      <li><b>Antes de cerrar:</b> en este dispositivo, descargá el backup JSON.</li>
      <li><b>Subilo a Google Drive / Dropbox / pendrive.</b></li>
      <li><b>En el otro dispositivo:</b> abrí el archivo HTML, vení a esta sección, importá el JSON.</li>
    </ol>
    <p class="small mt-md muted">Una alternativa más cómoda: guardá el HTML <b>y el JSON juntos en Google Drive</b>, y abrí siempre el HTML desde Drive. Cada vez que cierres, exportás y reemplazás el JSON. Si querés sincronización automática real, ese es el momento de pasarte a la versión con backend (Next.js + Supabase).</p>
  </div>
  `;
}

function exportar(){
  const blob = new Blob([JSON.stringify(STORE,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `habilitaciones-laplata-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('Backup descargado','ok');
}
window.exportar = exportar;

function importar(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const s = JSON.parse(e.target.result);
      if(!s.clientes || !s.expedientes) throw new Error('Formato inválido');
      if(!confirm(`Importar ${s.clientes.length} clientes y ${s.expedientes.length} expedientes? Esto reemplaza los datos actuales.`)) return;
      STORE = s; guardarStore(STORE); toast('Datos importados','ok'); render();
    }catch(err){ toast('Error: '+err.message,'error'); }
  };
  r.readAsText(f);
}
window.importar = importar;

function borrarTodo(){
  if(!confirm('¿BORRAR TODO? No se puede deshacer.')) return;
  if(!confirm('Última confirmación: ¿estás seguro?')) return;
  localStorage.removeItem(STORE_KEY);
  STORE = cargarStore();
  toast('Datos eliminados','error');
  navTo('');
}
window.borrarTodo = borrarTodo;

function renderPortal(token){
  const e = STORE.expedientes.find(x=>x.portal_token===token);
  if(!e) return `<div class="portal-wrap"><div class="card"><h1 style="font-size:24px;color:#b91c1c">Link no válido</h1><p class="muted">Este link no existe o fue revocado. Pedile al gestor que te genere uno nuevo.</p></div></div>`;
  const cli = STORE.clientes.find(c=>c.id===e.cliente_id);
  const items = e.items||[];
  const grupos = [...new Set(items.map(i=>i.grupo))];
  const pct = progresoPct(e);

  return `
  <div class="portal-wrap">
    <div class="portal-hero">
      <div class="sub">Habilitaciones La Plata · Portal</div>
      <h1>${escapeHtml(e.denominacion||'Tu expediente')}</h1>
      <div class="desc">Hola ${escapeHtml(cli?.razon_social||'')}, este es el listado de documentación que necesitamos para tu habilitación. Marcá cada ítem a medida que lo vayas teniendo y nosotros nos encargamos del resto.</div>
    </div>

    <div class="card mb-md">
      <div class="progress-row"><span><b>Progreso</b></span><span class="pct">${pct}%</span></div>
      <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
    </div>

    ${grupos.map(g=>{
      const gItems = items.filter(i=>i.grupo===g && i.obligatorio);
      if(!gItems.length) return '';
      return `
      <div class="checklist-group">
        <h3>${GRUPOS[g]||g}</h3>
        ${gItems.map(it=>`
          <div class="check-item ${it.checked?'done':''}">
            <div class="head">
              <input type="checkbox" ${it.checked?'checked':''} onchange="portalToggle('${e.id}','${it.codigo}',this.checked)">
              <div class="body">
                <div class="label">${escapeHtml(it.label)}</div>
                ${it.help?`<div class="help">${escapeHtml(it.help)}</div>`:''}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      `;
    }).join('')}

    <div class="card mt-lg" style="background:var(--mint);text-align:center">
      <p class="small">Cualquier duda escribinos por WhatsApp. Cuando termines de subir todo, lo revisamos y te confirmamos.</p>
    </div>
  </div>`;
}

function portalToggle(expId, codigo, val){
  const e = STORE.expedientes.find(x=>x.id===expId); if(!e) return;
  const it = e.items.find(i=>i.codigo===codigo); if(!it) return;
  it.checked = val; guardarStore(STORE); toast(val?'✓ Marcado':'Desmarcado','ok');
}
window.portalToggle = portalToggle;

if(!location.hash) location.hash = '#/';
render();
</script>
</body>
</html>
